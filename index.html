<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Alura2 - p5.js Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
  <!-- p5.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.6.0/lib/p5.min.js"></script>
  <script src="js/sketch.js" defer></script>
  <script src="js/dashboard.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="brand">Alura2 — p5.js Dashboard</div>
    <nav class="top-nav">
      <button id="menu-toggle" aria-label="Alternar menu">☰</button>
    </nav>
  </header>

  <div class="layout">
    <aside id="sidebar" class="sidebar">
      <h2>Menu</h2>
      <ul class="menu-list">
        <li class="menu-item" data-id="dashboard">Dashboard</li>
        <li class="menu-item" data-id="controls">Controles</li>
        <li class="menu-item" data-id="items">Itens</li>
        <li class="menu-item" data-id="about">Sobre</li>
      </ul>
    </aside>

    <main id="main" class="main">
      <section class="canvas-wrap">
        <div id="canvas-container" class="canvas-container"></div>
      </section>

      <section id="controls" class="panel">
        <h3>Controles</h3>
        <label class="control-row">
          <span>Animar</span>
          <input id="toggle-anim" type="checkbox" />
        </label>

        <label class="control-row">
          <span>Cor de fundo</span>
          <input id="bg-color" type="color" value="#0f172a" />
        </label>

        <div class="control-row">
          <button id="btn-clear">Limpar</button>
        </div>
      </section>

      <section id="items" class="panel">
        <h3>Itens do Dashboard</h3>
        <form id="item-form">
          <input id="item-text" placeholder="Novo item" />
          <button type="submit">Adicionar</button>
        </form>
        <ul id="item-list" class="item-list"></ul>
      </section>

      <section id="about" class="panel">
        <h3>Sobre</h3>
        <p>Exemplo de site com p5.js, menu, layout e painel de controle otimizado para boa performance.</p>
      </section>
    </main>
  </div>

  <footer class="site-footer">
    <div>© 2026 — Alura2</div>
    <div class="footer-links">Feito com p5.js</div>
  </footer>
</body>
</html>
